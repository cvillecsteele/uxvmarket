name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fe/site/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install fe/site dependencies
        run: cd fe/site && npm ci

      - name: Restore IndexNow cache
        uses: actions/cache@v4
        with:
          path: fe/site/.astro-indexnow-cache.json
          key: indexnow-cache-${{ github.ref_name }}
          restore-keys: indexnow-cache-

      - name: Build site
        # `npm run build` chains `prebuild` → `npm run sync-content`
        # (cd ../generator && uv run python -m generator) → `astro build`.
        # Generator reads vendors/<slug>/profile.json + products.json;
        # ensure vendors/ is present before this runs (see README's
        # GH Pages note re: pulling from S3 in CI).
        run: cd fe/site && npm run build
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fe/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
